📅 Follow-up: ${followUpFmt}
🎯 Closure  : ${closureFmt}

Action required: ${c.nextAction||'Please advise on current status'}

${c.remark?'Note: '+c.remark+'\n\n':''}Kindly revert at the earliest so we can proceed accordingly.

Thank you for your continued support.

Best regards`;

  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="overlayClose(event)"><div class="modal" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title">Reminder message — ${esc(c.ref)}</div>
      <button class="btn-icon" onclick="closeModal()"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:8px">Ready-to-send message. Copy and paste into WhatsApp, Email or SMS.</div>
    <textarea id="reminder-msg-txt" class="form-input" style="min-height:280px;font-size:12px;line-height:1.7;font-family:inherit">${esc(msg)}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="copyReminderMsg()">
        <svg viewBox="0 0 24 24" width="13" height="13" style="vertical-align:middle" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy message
      </button>
      ${c.contactMobile?`<button class="btn" style="background:#25d366;color:#fff;border-color:#25d366" onclick="openWhatsApp('${c.contactMobile}')">
        <svg viewBox="0 0 24 24" width="13" height="13" style="vertical-align:middle" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M3 21l1.65-3.8a9 9 0 1 1 3.4 2.9L3 21"/></svg>
        Open WhatsApp
      </button>`:''}
      ${c.contactEmail?`<button class="btn" onclick="openEmail('${esc(c.contactEmail)}','${esc(c.ref)}')" style="color:var(--sb-t);border-color:var(--sb-t)">
        <svg viewBox="0 0 24 24" width="13" height="13" style="vertical-align:middle" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Open Email
      </button>`:''}
      <button class="btn" onclick="closeModal()">Close</button>
    </div>
    <div id="copy-confirm" style="display:none;margin-top:8px;font-size:12px;color:var(--green);font-weight:500">✓ Message copied to clipboard!</div>
  </div></div>`;
}

function copyReminderMsg(){
  const txt=document.getElementById('reminder-msg-txt');
  txt.select();
  navigator.clipboard.writeText(txt.value).then(()=>{
    document.getElementById('copy-confirm').style.display='block';
    setTimeout(()=>{const el=document.getElementById('copy-confirm');if(el)el.style.display='none';},2500);
  }).catch(()=>{document.execCommand('copy');});
}

function openWhatsApp(mobile){
  const txt=document.getElementById('reminder-msg-txt')?.value||'';
  const num=mobile.replace(/[^0-9]/g,'');
  const intlNum=num.startsWith('91')?num:'91'+num;
  window.open('https://wa.me/'+intlNum+'?text='+encodeURIComponent(txt),'_blank');
}

function openEmail(email, subject){
  const txt=document.getElementById('reminder-msg-txt')?.value||'';
  window.open('mailto:'+email+'?subject=Follow-up: '+encodeURIComponent(subject)+'&body='+encodeURIComponent(txt),'_blank');
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}
function overlayClose(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════

function showPortal(user){
  document.getElementById('init-loading').style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('portal-wrap').style.display='block';
  const initials=user.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('user-info-badge').innerHTML=
    '<div class="user-badge">'
    +'<div class="user-avatar '+(user.role==='admin'?'role-badge-admin':'role-badge-sales')+'">'+initials+'</div>'
    +'<div><div style="font-weight:500;color:var(--text)">'+esc(user.name)+'</div>'
    +'<div style="font-size:10px;color:var(--text2);text-transform:capitalize">'+(user.role==='admin'?'Administrator':'Sales')+'</div>'
    +'</div></div>';
}

async function initApp(){
  // Step 1: Load all data (Cases, Orders, Users etc.)
  try{ await loadAllData(); }catch(e){ console.warn('Load error:',e); }

  // Step 2: Hide loading screen always
  document.getElementById('init-loading').style.display='none';

  // Step 3: Try restore session
  if(restoreSession()){
    const stillValid=users.find(u=>u.username===currentUser.username);
    if(stillValid){
      showPortal(currentUser);
      refreshCurrentTab();
      return;
    }
    currentUser=null;
    try{ sessionStorage.removeItem('crm_user'); }catch(e){}
  }

  // Step 4: Show login screen
  document.getElementById('login-screen').style.display='flex';
  setTimeout(()=>{ const el=document.getElementById('login-username'); if(el)el.focus(); },100);
}

// Init OAuth if configured
if(CLIENT_ID!=='YOUR_OAUTH_CLIENT_ID_HERE'){
  setTimeout(initTokenClient, 300);
}

requestNotifPermission();

// Start the app
initApp();
</script>
</div><!-- end portal-wrap -->

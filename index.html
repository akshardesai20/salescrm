<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--surface:#ffffff;--border:#e5e7eb;--border2:#d1d5db;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --sa:#1d9e75;--sa-bg:#e1f5ee;--sa-t:#0f6e56;
  --sb:#378add;--sb-bg:#dbeafe;--sb-t:#1e40af;
  --sc:#d97706;--sc-bg:#fef3c7;--sc-t:#92400e;
  --sd:#7c3aed;--sd-bg:#ede9fe;--sd-t:#4c1d95;
  --sx:#6b7280;--sx-bg:#f3f4f6;--sx-t:#374151;
  --green:#16a34a;--green-bg:#dcfce7;
  --red:#dc2626;--red-bg:#fee2e2;
  --amber:#d97706;--amber-bg:#fef3c7;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;-webkit-text-size-adjust:100%}

/* NAV */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50;gap:6px;flex-wrap:nowrap}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.logo{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.logo i{color:var(--sa);font-size:20px}
.version-badge{font-size:10px;background:var(--sc-bg);color:var(--sc-t);padding:2px 8px;border-radius:20px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;min-width:0}
.sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* TABS */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);white-space:nowrap;display:flex;align-items:center;gap:6px;transition:color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--sa);font-weight:500}
.rem-badge{background:var(--red);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;margin-left:2px}

/* MAIN */
.main{padding:20px 24px;max-width:1400px;margin:0 auto}

/* BUTTONS */
.btn{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);font-size:12px;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:6px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;transition:background .12s}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--text);color:#fff;border-color:transparent}
.btn-primary:hover{background:#1f2937}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-icon{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;color:var(--text2);transition:background .12s}
.btn-icon:hover{background:var(--bg);color:var(--text)}
.btn-danger{color:var(--red);border-color:var(--border)}
.btn-danger:hover{background:var(--red-bg)}
.btn-promote{color:var(--sa);border-color:var(--border)}
.btn-promote:hover{background:var(--sa-bg)}

/* STAGE BADGES */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bs-a{background:var(--sa-bg);color:var(--sa-t)}
.bs-b{background:var(--sb-bg);color:var(--sb-t)}
.bs-c{background:var(--sc-bg);color:var(--sc-t)}
.bs-d{background:var(--sd-bg);color:var(--sd-t)}
.bs-x{background:var(--sx-bg);color:var(--sx-t)}
.b-active{background:var(--green-bg);color:var(--green)}
.b-hold{background:#f3f4f6;color:#6b7280}
.b-delayed{background:var(--amber-bg);color:var(--amber)}
.b-won{background:var(--green-bg);color:var(--green)}
.b-lost{background:var(--red-bg);color:var(--red)}

/* METRIC CARDS */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.metric-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:14px 16px}
.metric-card.stage-a{border-left:3px solid var(--sa)}
.metric-card.stage-b{border-left:3px solid var(--sb)}
.metric-card.stage-c{border-left:3px solid var(--sc)}
.metric-card.stage-d{border-left:3px solid var(--sd)}
.mc-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:4px}
.mc-val{font-size:22px;font-weight:600;color:var(--text)}
.mc-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* FUNNEL */
.funnel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
.funnel-title{font-size:13px;font-weight:500;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:7px}
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.funnel-lbl{font-size:11px;color:var(--text2);width:150px;flex-shrink:0}
.funnel-bar-bg{flex:1;height:26px;background:var(--bg);border-radius:5px;overflow:hidden}
.funnel-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:9px;font-size:11px;font-weight:500;color:#fff;transition:width .5s ease;min-width:28px}
.funnel-cnt{font-size:11px;font-weight:500;width:70px;text-align:right;flex-shrink:0}

/* CHARTS GRID */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.chart-title{font-size:12px;font-weight:500;margin-bottom:10px;color:var(--text)}

/* ALERT */
.alert{border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px}
.alert-danger{background:var(--red-bg);border:1px solid #fca5a5;color:var(--red)}
.alert-warn{background:var(--amber-bg);border:1px solid #fcd34d;color:var(--amber)}
.alert-info{background:var(--sb-bg);border:1px solid #93c5fd;color:var(--sb-t)}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.search-input{flex:1;min-width:160px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;background:var(--surface);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}
.filter-select{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;background:var(--surface);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{display:table-header-group !important}

td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
tbody tr:hover td{background:#f9fafb}
tbody tr:last-child td{border-bottom:none}
.cell-clamp{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.overdue{color:var(--red);font-weight:500}
.due-soon{color:var(--amber);font-weight:500}
.ok-date{color:var(--text2)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);width:680px;max-height:88vh;overflow-y:auto;padding:20px;margin-bottom:20px;box-sizing:border-box}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.form-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);padding:10px 0 6px;border-top:1px solid var(--border);margin-top:4px}
.form-section:first-of-type{border-top:none;padding-top:0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:500;color:var(--text2)}
.form-label .req{color:var(--red)}
.form-input{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;background:var(--surface);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;width:100%}
.form-input:focus{outline:none;border-color:var(--sa);box-shadow:0 0 0 2px rgba(29,158,117,.15)}
.form-input.error{border-color:var(--red)}
textarea.form-input{resize:vertical;min-height:60px}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.other-field{display:none;margin-bottom:10px}
.other-field.visible{display:flex;flex-direction:column;gap:4px}

/* DETAIL VIEW */
.detail-grid{display:grid;grid-template-columns:140px 1fr;gap:6px 14px;font-size:12px}
.dk{color:var(--text2);font-size:11px}
.dv{color:var(--text)}
.dsec{grid-column:1/-1;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);padding-top:10px;border-top:1px solid var(--border);margin-top:4px}

/* HISTORY TIMELINE */
.history-wrap{margin-top:14px}
.hist-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:10px}
.hist-item{display:flex;gap:10px;margin-bottom:10px;position:relative}
.hist-dot{width:9px;height:9px;border-radius:50%;margin-top:3px;flex-shrink:0;border:2px solid var(--surface)}
.hist-line{position:absolute;left:3.5px;top:12px;bottom:-10px;width:1px;background:var(--border)}
.hist-body{font-size:12px}
.hist-meta{font-size:11px;color:var(--text2);margin-top:2px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--text2);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--sa);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px;color:var(--text2);font-size:12px}

/* UPCOMING MINI */
.upcoming-item{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);gap:10px}
.upcoming-item:last-child{border-bottom:none}

/* SETUP BANNER */
.setup-banner{background:#fffbeb;border:1px solid #fbbf24;border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px}
.setup-banner h3{font-size:14px;font-weight:600;color:#92400e;margin-bottom:8px}
.setup-step{display:flex;gap:10px;margin-bottom:6px;font-size:12px;color:#78350f;align-items:flex-start}
.setup-num{width:20px;height:20px;border-radius:50%;background:#fbbf24;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}

/* RESPONSIVE */
/* ── TABLET (≤900px) ── */
@media(max-width:900px){
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
  .charts-row{grid-template-columns:1fr}
  .modal{width:96%;margin:0 2%}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .topbar{padding:0 12px;height:50px}
  .main{padding:12px 14px}
  .tabs{padding:0 12px}
  .tab{padding:8px 10px;font-size:12px}
  .funnel-lbl{width:90px;font-size:10px}
}

/* ── MOBILE LANDSCAPE / SMALL TABLET (≤768px) ── */
@media(max-width:768px){
  .metrics-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .login-card{width:92%;padding:24px 20px}
  .filter-bar{flex-direction:column;align-items:stretch}
  .filter-bar .search-input,.filter-bar .filter-select{width:100%}
  .tbl-wrap{font-size:11px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  th,td{padding:7px 6px}
  .cell-clamp{max-width:90px}
  .modal{width:100%;margin:0;border-radius:12px 12px 0 0;position:fixed;bottom:0;
    max-height:92vh;border-bottom:none}
  .modal-overlay{align-items:flex-end;padding:0}
  .topbar-left .logo span{display:none}
  .funnel-row{flex-wrap:wrap}
  .funnel-lbl{width:100%;margin-bottom:2px}
  .funnel-bar-bg{width:100%}
  /* Hide less-critical columns on tablet */
  .hide-mobile{display:none !important}
}

/* ── MOBILE PORTRAIT (≤480px) ── */
@media(max-width:480px){
  /* Metrics */
  .metrics-grid{grid-template-columns:1fr 1fr;gap:6px}
  .metric-card{padding:10px 10px}
  .mc-val{font-size:16px !important}
  .mc-label{font-size:9px}
  .mc-sub{font-size:9px}

  /* Topbar — logo small, hide text labels */
  .topbar{height:52px;padding:0 10px;gap:4px}
  .logo img{height:28px !important;max-width:70px}
  .logo span{display:none}
  .topbar-right{gap:3px;flex-wrap:nowrap}
  #auth-btn{padding:4px 8px;font-size:11px}
  #auth-btn svg{display:none}
  .btn.btn-primary{padding:5px 9px;font-size:11px}
  .btn.btn-sm{padding:4px 8px;font-size:11px}
  #sync-status{display:none}
  #auth-status{display:none}
  .version-badge{display:none}

  /* Tabs — compact */
  .tabs{padding:0 2px}
  .tab{padding:8px 6px;font-size:10px;gap:2px}
  .tab svg{width:12px;height:12px;flex-shrink:0}
  .tab-text{display:none}

  /* Main content */
  .main{padding:8px 8px}

  /* Login */
  .login-card{width:94%;padding:20px 16px;border-radius:12px}
  .login-logo-title{font-size:18px}
  .login-btn{font-size:13px;padding:10px}

  /* Dashboard cards */
  .funnel-card{padding:10px}
  .funnel-lbl{font-size:10px;width:80px}
  .charts-row{gap:8px}
  .chart-card{padding:10px}

  /* Tables — tighter on mobile */
  .filter-bar{gap:5px}
  .btn-icon{width:26px;height:26px}
  th{font-size:9px;padding:5px 4px;white-space:nowrap}
  td{font-size:11px;padding:5px 4px}
  .cell-clamp{max-width:70px}
  .tbl-wrap{border-radius:8px}

  /* Forms */
  .form-row,.form-row-3{grid-template-columns:1fr;gap:8px}
  .modal{max-height:95vh}
  .detail-grid{grid-template-columns:100px 1fr}

  /* User badge — hide role text */
  .user-badge>div:last-child>div:last-child{display:none}
  .user-badge{padding:3px 6px;gap:5px}

  /* Hide less-critical table columns */
  .hide-mobile{display:none !important}

  /* Orders received — prevent font overflow */
  .mc-val{word-break:break-all}

  /* Action buttons — tighter */
  td div[style*="display:flex;gap:3px"]{gap:2px}
}

/* ── EXTRA SMALL (≤380px) ── */
@media(max-width:380px){
  .topbar{padding:0 8px}
  .main{padding:6px 6px}
  .tabs{padding:0}
  .tab{padding:7px 5px;font-size:10px}
  th{font-size:8px;padding:4px 3px}
  td{font-size:10px;padding:4px 3px}
  .cell-clamp{max-width:55px}
  .btn-icon{width:24px;height:24px}
  .btn-icon svg{width:12px;height:12px}
}

.personal-perf-grid{grid-template-columns:repeat(2,1fr)}
@media(min-width:600px){.personal-perf-grid{grid-template-columns:repeat(4,1fr)}}
/* ── LARGE DESKTOP (≥1400px) ── */
@media(min-width:1400px){
  .main{padding:20px 32px}
  .metrics-grid{grid-template-columns:repeat(4,1fr);gap:16px}
  .charts-row{gap:18px}
  .metric-card{padding:16px 18px}
  .mc-val{font-size:26px}
}

/* ── Login screen ── */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f6e56,#185fa5);
  display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{background:#ffffff;border-radius:16px;padding:32px 36px;width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo-title{font-size:22px;font-weight:700;color:#111827;margin-top:8px}
.login-logo-sub{font-size:12px;color:#6b7280;margin-top:4px}
.login-field{margin-bottom:14px}
.login-label{font-size:12px;font-weight:500;color:#374151;margin-bottom:5px;display:block}
.login-input{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;
  font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  color:#111827;box-sizing:border-box;outline:none;transition:border-color .15s}
.login-input:focus{border-color:#1d9e75;box-shadow:0 0 0 3px rgba(29,158,117,.1)}
.login-btn{width:100%;padding:11px;background:#1d9e75;color:#fff;border:none;
  border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;transition:background .15s}
.login-btn:hover{background:#0f6e56}
.login-btn:disabled{background:#9ca3af;cursor:not-allowed}
.login-error{color:#dc2626;font-size:12px;text-align:center;margin-top:8px;display:none;
  background:#fee2e2;padding:8px;border-radius:6px}
.login-footer{text-align:center;font-size:11px;color:#9ca3af;margin-top:16px}
/* User badge */
.user-badge{display:flex;align-items:center;gap:7px;padding:5px 10px;
  background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);font-size:12px}
.user-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.role-badge-admin{background:#1d9e75}.role-badge-sales{background:#378add}
/* Notification toast */
.notif-toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:#fff;
  padding:12px 16px;border-radius:12px;font-size:12px;z-index:500;
  max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:slideIn .3s ease}
.notif-toast .notif-title{font-weight:600;margin-bottom:4px;color:#fbbf24}
.notif-toast .notif-body{color:#d1d5db;line-height:1.5}
.notif-toast .notif-close{position:absolute;top:8px;right:10px;cursor:pointer;color:#9ca3af;font-size:14px}
.notif-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.notif-btn{padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;border:none;font-weight:500}
.notif-btn-green{background:#16a34a;color:#fff}
.notif-btn-gray{background:#374151;color:#d1d5db}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.today-alert{background:linear-gradient(135deg,#fff7ed,#fff);border:1px solid #fed7aa;
  border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.today-alert-icon{font-size:20px;flex-shrink:0}
.today-alert-body{flex:1}
.today-alert-title{font-weight:600;font-size:13px;color:#92400e;margin-bottom:4px}
.today-alert-list{font-size:12px;color:#78350f;list-style:none;padding:0}
.today-alert-list li{padding:3px 0;border-bottom:0.5px solid #fed7aa}
.today-alert-list li:last-child{border:none}
</style>

/* GUARANTEED TABLE HEADER ORDER FIX */
table  { border-collapse:collapse; width:100%; table-layout:auto; }
thead  { display:table-header-group !important; }
tbody  { display:table-row-group    !important; }
tr     { display:table-row          !important; }
th, td { display:table-cell         !important; }
thead th { background:var(--bg); font-size:10px; font-weight:500;
           color:var(--text2); text-transform:uppercase;
           letter-spacing:.4px; white-space:nowrap;
           padding:9px 10px; border-bottom:1px solid var(--border); }
</style>
</head>

// ── India FY helpers ─────────────────────────────────────────────
function getCurrentFY(){
  const y=TODAY.getFullYear(), m=TODAY.getMonth(); // 0=Jan
  return m>=3 ? y : y-1; // FY starts April (month 3)
}
function getFYRange(fy){
  return {
    start: new Date(fy, 3, 1),   // 1 Apr
    end:   new Date(fy+1, 2, 31, 23, 59, 59) // 31 Mar
  };
}
function getFYLabel(fy){
  return 'FY '+(String(fy).slice(2)+'-'+String(fy+1).slice(2));
}
function parseAnyDate(s){
  // Handles: 2026-01-15 | 1/15/2026 | 15/01/2026 | 15-Jan-2026 | Jan 15, 2026
  if(!s) return null;
  s=String(s).trim();
  if(!s||s==='—'||s==='') return null;
  // Already a Date object
  if(s instanceof Date) return s;
  // Try ISO format first (yyyy-mm-dd)
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s);
  // Try M/D/YYYY (US format from Google Sheets)
  const us=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
  if(us) return new Date(parseInt(us[3]),parseInt(us[1])-1,parseInt(us[2]));
  // Try D/M/YYYY (Indian format)
  const ind=/^(\d{1,2})-(\d{1,2})-(\d{4})$/.exec(s);
  if(ind) return new Date(parseInt(ind[3]),parseInt(ind[2])-1,parseInt(ind[1]));
  // Fallback to native parser
  const d=new Date(s);
  return isNaN(d)?null:d;
}
function getFYFromDate(d){
  if(!d) return null;
  const dd=parseAnyDate(d);
  if(!dd) return null;
  const y=dd.getFullYear(), m=dd.getMonth();
  return m>=3 ? y : y-1;
}
function isInFY(dateStr, fy){
  if(!dateStr) return false;
  const d=parseAnyDate(dateStr);
  if(!d||isNaN(d)) return false;
  const {start,end}=getFYRange(fy);
  return d>=start && d<=end;
}
function isClosureInFY(closureStr, fy){
  // closureStr format: "2026-09" (YYYY-MM)
  if(!closureStr) return false;
  const d=new Date(closureStr+'-01');
  return getFYFromDate(d)===fy;

const BASE = 'https://sheets.googleapis.com/v4/spreadsheets';

// Parse CSV text into 2D array (handles quoted fields with commas)
function parseCSV(text){
  const rows=[];
  const lines=text.split(/\r?\n/);
  for(const line of lines){
    if(!line.trim())continue;
    const row=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){
        if(inQ&&line[i+1]==='"'){cur+='"';i++;} // escaped quote
        else inQ=!inQ; // toggle quote mode — don't add quote char to value
      } else if(ch===','&&!inQ){row.push(cur.trim());cur='';}
      else cur+=ch;
    }
    row.push(cur.trim()); // trim any leftover whitespace
    rows.push(row);
  }
  return rows;
}

// Fetch sheet as CSV — works from file://, Netlify, anywhere (no CORS)
async function fetchSheet(range){
  const sheetName=range.split('!')[0];
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  try{
    const r=await fetch(url);
    if(!r.ok){ console.warn('Sheet not found: '+sheetName); return []; }
    const text=await r.text();
    if(!text||text.includes('Unauthorized')||text.trim().startsWith('<')){
      console.warn('Sheet inaccessible or missing: '+sheetName); return [];
    }
    const rows=parseCSV(text);
    return rows.slice(1).filter(r=>r.some(c=>String(c).trim()));
  }catch(e){
    console.warn('fetchSheet error for '+sheetName+':', e);
    return [];
  }
}

// GOOGLE SHEETS API — WRITE (append row)
// ═══════════════════════════════════════════════════════════════════════
// ── OAuth2 — Google Identity Services (modern token flow) ───────────
let oauthToken = null;
let tokenClient = null;
let tokenResolve = null;

function initTokenClient(){
  if(CLIENT_ID==='YOUR_OAUTH_CLIENT_ID_HERE') return;
  // Load GIS script lazily
  if(window.google?.accounts?.oauth2){ setupTokenClient(); return; }
  const s=document.createElement('script');
  s.src='https://accounts.google.com/gsi/client';
  s.onload=setupTokenClient;
  document.head.appendChild(s);
}

function setupTokenClient(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){ console.error('OAuth error:',resp); return; }
      oauthToken=resp.access_token;
      // Token valid for 1 hour
      setTimeout(()=>{ oauthToken=null; updateAuthUI(false); }, 3500000);
      updateAuthUI(true);
      if(tokenResolve){ tokenResolve(oauthToken); tokenResolve=null; }
    }
  });
  updateAuthUI(false);
}

function updateAuthUI(signedIn){
  const btn=document.getElementById('auth-btn');
  const status=document.getElementById('auth-status');
  if(signedIn){
    if(btn) btn.style.display='none';
    if(status){ status.textContent='✓ Edit enabled'; status.style.color='var(--green)'; }
  } else {
    if(btn) btn.style.display='inline-flex';
    if(status){ status.textContent='Sign in to add/edit'; status.style.color='var(--text3)'; }
  }
}

async function ensureAuth(){
  if(oauthToken) return oauthToken;
  if(!tokenClient){ initTokenClient(); await new Promise(r=>setTimeout(r,1000)); }
  if(!tokenClient) return null;
  return new Promise((resolve)=>{
    tokenResolve=resolve;
    tokenClient.requestAccessToken({prompt:''});
  });
}

async function writeRequest(url, method, body){
  let token=null;
  try{ token=await ensureAuth(); }catch(e){ console.warn('Auth error:',e); }
  if(!token){
    throw new Error('Please sign in first. Click "Sign in to add/edit" button in the top bar.');
  }
  const headers={'Content-Type':'application/json','Authorization':'Bearer '+token};
  const r=await fetch(url,{method,headers,body:JSON.stringify(body)});
  if(!r.ok){
    const e=await r.json();
    // Token may have expired
    if(e.error?.code===401){ oauthToken=null; updateAuthUI(false); }
    throw new Error(e.error?.message||'Write error');
  }
  return r.json();
}

async function appendRow(sheetName, values){
  const url=`${BASE}/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!A1:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
  return writeRequest(url,'POST',{values:[values]});
}

async function updateRow(sheetName, rowNum, values){
  const endCol=String.fromCharCode(64+values.length);
  const url=`${BASE}/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!A${rowNum}:${endCol}${rowNum}?valueInputOption=RAW`;
  return writeRequest(url,'PUT',{values:[values]});
}

// Global amount formatter
function fmtAmt(v){
  if(!v||isNaN(v)) return '₹0';
  const n=Number(v);
  if(n>=10000000) return '₹'+(n/10000000).toFixed(2)+' Cr';
  if(n>=100000)   return '₹'+(n/100000).toFixed(1)+' L';
  return '₹'+n.toLocaleString('en-IN');
}

function days(d){if(!d)return null;const dd=parseAnyDate(d);if(!dd||isNaN(dd))return null;dd.setHours(0,0,0,0);return Math.round((dd-TODAY)/86400000);}
function fmt(d){if(!d)return'—';const dd=parseAnyDate(d);return dd?dd.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';}
function fmtMon(m){if(!m)return'—';return new Date(m+'-01').toLocaleDateString('en-IN',{month:'short',year:'numeric'});}
function dcls(d){const n=days(d);if(n===null)return'ok-date';if(n<0)return'overdue';if(n<=7)return'due-soon';return'ok-date';}
function dlbl(d){const n=days(d);if(n===null)return'—';if(n<0)return fmt(d)+' ⚠ Overdue';if(n===0)return'Today!';if(n===1)return'Tomorrow';if(n<=7)return fmt(d)+' ('+n+'d)';return fmt(d);}
function sbadge(s){const d=STAGE_DEF[s]||STAGE_DEF.EXPLORE;return`<span class="badge ${d.cls}">${d.label}</span>`;}
function stbadge(s){const m={Active:'b-active',Hold:'b-hold',Delayed:'b-delayed',Won:'b-won',Lost:'b-lost'};return`<span class="badge ${m[s]||'b-hold'}">${s}</span>`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/`/g,'&#96;').replace(/'/g,'&#39;');}
function genId(){return 'C'+Date.now();}
function genHistId(){return 'H'+Date.now();}
function todayStr(){return TODAY.toISOString().split('T')[0];}

          <th style="text-align:right;padding:6px 8px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px">Overdue</th>
        </tr></thead>
        <tbody>${users.filter(u=>u.role==='sales').map(u=>{
          const uCases=cases.filter(c=>c.assignedTo===u.username);
          const uPipe=uCases.filter(c=>c.stage!=='EXPLORE').reduce((a,c)=>a+Number(c.amount||0),0);
          const uStageD=uCases.filter(c=>c.stage==='D').length;
          const uOv=uCases.filter(c=>c.followUp&&days(c.followUp)<0&&c.status!=='Hold').length;
          return '<tr style="border-bottom:1px solid var(--border)">'
            +'<td style="padding:8px;font-weight:500">'+esc(u.name)+'<span style="font-size:10px;color:var(--text2);margin-left:6px">@'+esc(u.username)+'</span></td>'
            +'<td style="padding:8px;text-align:right">'+uCases.length+'</td>'
            +'<td style="padding:8px;text-align:right;font-weight:500;color:var(--sa)">₹'+uPipe.toFixed(1)+' Cr</td>'
            +'<td style="padding:8px;text-align:right">'+uStageD+'</td>'
            +'<td style="padding:8px;text-align:right;color:'+(uOv>0?'var(--red)':'var(--text2)')+'">'+( uOv>0?'⚠ '+uOv:'0')+'</td>'
            +'</tr>';
        }).join('')}</tbody>
      </table>
    </div>`:''}
    `;
  setTimeout(renderTypeChart,80);
}

function renderTypeChart(){
  const tm={};
  cases.filter(c=>c.stage!=='EXPLORE').forEach(c=>{const t=c.projectType||'Other';tm[t]=(tm[t]||0)+Number(c.amount||0);});
  const te=Object.entries(tm).sort((a,b)=>b[1]-a[1]);
  if(typeChartInst)typeChartInst.destroy();
  const canvas=document.getElementById('typeChart');
  if(!canvas)return;
  typeChartInst=new Chart(canvas,{
    type:'bar',
    data:{labels:te.map(e=>e[0]),datasets:[{data:te.map(e=>parseFloat(e[1].toFixed(1))),backgroundColor:['#1d9e75','#378add','#d97706','#7c3aed','#6b7280'],borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},color:'#6b7280'}},y:{ticks:{font:{size:10},color:'#6b7280'}}}}
  });
}

// ═══════════════════════════════════════════════════════════════════════
// PIPELINE TABLE
// ═══════════════════════════════════════════════════════════════════════
function renderPipeline(){
  const el=document.getElementById('tab-pipeline');
  const g=id=>document.getElementById(id)?.value||'';
  let data=[...visibleCases()];
  const srch=g('s-search').toLowerCase();
  const stF=g('s-stage'),tyF=g('s-type'),stF2=g('s-status'),soF=g('s-sort');
  if(srch)data=data.filter(c=>(c.ref+c.contractor+c.endUser+c.location+c.contactPerson+c.nextAction).toLowerCase().includes(srch));
  if(stF)data=data.filter(c=>c.stage===stF);
  if(tyF)data=data.filter(c=>c.projectType===tyF);
  if(stF2)data=data.filter(c=>c.status===stF2);
  if(soF==='amt-d')data.sort((a,b)=>b.amount-a.amount);
  else if(soF==='amt-a')data.sort((a,b)=>a.amount-b.amount);
  else if(soF==='fu')data.sort((a,b)=>{if(!a.followUp)return 1;if(!b.followUp)return -1;return new Date(a.followUp)-new Date(b.followUp);});
  else if(soF==='cl')data.sort((a,b)=>{if(!a.expectedClosure)return 1;if(!b.expectedClosure)return -1;return a.expectedClosure.localeCompare(b.expectedClosure);});

  const rows=data.map((c,i)=>`<tr>
    <td style="color:var(--text3);font-size:10px">${i+1}</td>
    <td style="min-width:140px"><div style="font-weight:500;font-size:12px">${esc(c.ref)}</div><div style="font-size:10px;color:var(--text2);margin-top:2px">${esc(c.contractor)}</div></td>
    <td>${sbadge(c.stage)}</td>
    <td style="min-width:110px"><select onchange="quickUpdateType('${c.id}',this.value)" style="font-size:11px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;padding:3px 6px;border-radius:4px;width:100%" title="Click to change type">
      ${PTYPES.map(t=>`<option value="${t}"${t===c.projectType?' selected':''}>${t}</option>`).join('')}
    </select></td>
    <td><div class="cell-clamp" title="${esc(c.nextAction)}">${esc(c.nextAction||'—')}</div></td>
    <td><div style="font-size:11px">${esc(c.contactPerson||'—')}</div>${c.contactMobile?`<div style="font-size:10px;color:var(--text2)">${esc(c.contactMobile)}</div>`:''}</td>
    <td style="font-weight:500">${c.amount?'₹'+c.amount:c.stage==='EXPLORE'?'TBD':'—'}</td>
    <td class="hide-mobile" style="font-size:11px;color:var(--text2)">${c.proposalDate?fmt(c.proposalDate):'—'}</td>
    <td class="${dcls(c.followUp)}" style="white-space:nowrap;font-size:11px">${dlbl(c.followUp)}</td>
    <td class="hide-mobile" style="font-size:11px;color:var(--text2)">${fmtMon(c.expectedClosure)}</td>
    <td style="font-size:11px;color:var(--text2)">${esc(c.assignedTo||'—')}</td>
    <td><div style="display:flex;gap:3px">
      <button class="btn-icon" onclick="tryEdit('${c.id}')" title="Edit" style="${!isAdmin()&&c.assignedTo!==currentUser?.username?'opacity:.4;cursor:not-allowed':''}"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;flex-shrink:0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M7 7H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-1"/><path d="M20.385 6.585a2.1 2.1 0 0 0-2.97-2.97L9 12v3h3l8.385-8.415z"/></svg></button>
      <button class="btn-icon" onclick="openModal('view','${c.id}')" title="View details"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;flex-shrink:0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="2"/><path d="M22 12c-2.667 4.667-6 7-10 7s-7.333-2.333-10-7c2.667-4.667 6-7 10-7s7.333 2.333 10 7"/></svg></button>
      <button class="btn-icon btn-promote" onclick="promoteCase('${c.id}')" title="Move to next stage"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;flex-shrink:0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
      <button class="btn-icon btn-danger" onclick="confirmDeleteCase('${c.id}')" title="Delete"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;flex-shrink:0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
    </div></td>
  </tr>`).join('');

  el.innerHTML=`
    <div class="filter-bar">
      <input class="search-input" placeholder="Search project, contractor, contact…" oninput="renderPipeline()" id="s-search">
      <select class="filter-select" onchange="renderPipeline()" id="s-stage">
        <option value="">All stages</option>
        <option value="A">Stage A — BD</option>
        <option value="B">Stage B — Marketing</option>
        <option value="C">Stage C — Proposal</option>
        <option value="D">Stage D — Order Final.</option>
        <option value="EXPLORE">Explore</option>
      </select>
      <select class="filter-select" onchange="renderPipeline()" id="s-type">
        <option value="">All types</option>
        ${PTYPES.map(t=>`<option>${t}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="renderPipeline()" id="s-status">
        <option value="">All statuses</option>
        ${STATUSES.map(s=>`<option>${s}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="renderPipeline()" id="s-sort">
        <option value="">Sort: default</option>
        <option value="amt-d">Amount ↓</option>
        <option value="amt-a">Amount ↑</option>
        <option value="fu">Follow-up ↑</option>
        <option value="cl">Closure month ↑</option>
      </select>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>#</th><th>Project reference</th><th>Stage</th><th>Type</th><th>Next action</th>
        <th>Contact</th><th>Amount (Cr)</th><th class="hide-mobile">Proposal Date</th>
        <th>Follow-up</th><th class="hide-mobile">Timeline</th><th>Sales Person</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows||`<tr><td colspan="12"><div class="empty">No cases match your filters.</div></td></tr>`}</tbody>
    </table></div>`;
}

// REMINDERS
// ═══════════════════════════════════════════════════════════════════════
function renderReminders(){
  const vc2=visibleCases();
  const ov=vc2.filter(c=>c.followUp&&days(c.followUp)<0&&c.status!=='Hold').sort((a,b)=>new Date(a.followUp)-new Date(b.followUp));
  const ds=vc2.filter(c=>c.followUp&&days(c.followUp)>=0&&days(c.followUp)<=7).sort((a,b)=>new Date(a.followUp)-new Date(b.followUp));
  const up=vc2.filter(c=>c.followUp&&days(c.followUp)>7&&days(c.followUp)<=30).sort((a,b)=>new Date(a.followUp)-new Date(b.followUp));
  const nd=vc2.filter(c=>!c.followUp&&c.status!=='Hold');

  function remTable(arr){
    if(!arr.length)return'<div class="empty" style="padding:12px">None</div>';
    return`<div class="tbl-wrap" style="margin-bottom:4px"><table>
      <thead><tr><th>Project</th><th>Stage</th><th>Next action</th><th>Contact</th><th>Mobile</th><th>Follow-up</th><th>Amount</th><th></th></tr></thead>
      <tbody>${arr.map(c=>`<tr>
        <td><div style="font-weight:500;font-size:12px">${esc(c.ref)}</div><div style="font-size:10px;color:var(--text2)">${esc(c.contractor)} · ${esc(c.location)}</div></td>
        <td>${sbadge(c.stage)}</td>
        <td><div class="cell-clamp">${esc(c.nextAction||'—')}</div></td>
        <td style="font-size:11px">${esc(c.contactPerson||'—')}</td>
        <td style="font-size:11px;color:var(--text2)">${esc(c.contactMobile||'—')}</td>
        <td class="${dcls(c.followUp)}" style="font-size:11px;white-space:nowrap">${dlbl(c.followUp)}</td>
        <td style="font-size:12px;font-weight:500">${c.amount?'₹'+c.amount+' Cr':'—'}</td>
        <td><button class="btn-icon" onclick="tryEdit('${c.id}')"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:middle;flex-shrink:0" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M7 7H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-1"/><path d="M20.385 6.585a2.1 2.1 0 0 0-2.97-2.97L9 12v3h3l8.385-8.415z"/></svg></button></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  document.getElementById('tab-reminders').innerHTML=`
    <div style="margin-bottom:6px;display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block"></span><strong style="font-size:13px;color:var(--red)">Overdue (${ov.length})</strong></div>${remTable(ov)}
    <div style="margin:14px 0 6px;display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--amber);display:inline-block"></span><strong style="font-size:13px;color:var(--amber)">Due within 7 days (${ds.length})</strong></div>${remTable(ds)}
    <div style="margin:14px 0 6px;display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:#16a34a;display:inline-block"></span><strong style="font-size:13px">Next 30 days (${up.length})</strong></div>${remTable(up)}
    <div style="margin:14px 0 6px;display:flex;align-items:center;gap:6px"><svg viewBox="0 0 24 24" width="13" height="13" style="vertical-align:middle;flex-shrink:0;color:var(--text2)" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M20 20H7a2 2 0 0 1-2-2V7"/><path d="M16 2v2M3 3l18 18"/><line x1="3" y1="10" x2="8" y2="10"/></svg><strong style="font-size:13px">No date set (${nd.length})</strong></div>${remTable(nd)}`;
}

// ORDERS
// ═══════════════════════════════════════════════════════════════════════
function renderOrders(){
  const curFY=getCurrentFY();
  const selFY=parseInt(document.getElementById('fy-select-ord')?.value||String(curFY))||curFY;

  // Filter by role — sales sees only their orders, admin sees all
  const myFilter=o=>isAdmin()||!o.assignedTo||o.assignedTo===currentUser?.username;

  const rcv=orders.filter(o=>o.type==='received'&&myFilter(o)&&isInFY(o.date,selFY));
  const lst=orders.filter(o=>o.type==='lost'&&myFilter(o)&&isInFY(o.date,selFY));
  const rcvAll=orders.filter(o=>o.type==='received'&&isInFY(o.date,selFY)); // all for admin total
  const lstAll=orders.filter(o=>o.type==='lost'&&isInFY(o.date,selFY));

  const rt=rcv.reduce((a,o)=>a+Number(o.amount||0),0);
  const lt=lst.reduce((a,o)=>a+Number(o.amount||0),0);
  const total=rt+lt;
  const winPct=total>0?((rt/total)*100).toFixed(1):0;
  const lossPct=total>0?((lt/total)*100).toFixed(1):0;
  const winCntPct=(rcv.length+lst.length)>0?(rcv.length/(rcv.length+lst.length)*100).toFixed(1):0;

  // FY selector
  const fyOpts=[curFY-2,curFY-1,curFY].map(fy=>
    `<option value="${fy}"${fy===selFY?' selected':''}>${getFYLabel(fy)}</option>`
  ).join('');

  // User name lookup
  function userName(username){
    if(!username||username==='—') return '—';
    const u=users.find(x=>x.username===username);
    return u?u.name:username;
  }

  function tbl(arr, showAssigned){
    if(!arr.length)return'<div class="empty">None recorded yet</div>';
    return`<div class="tbl-wrap"><table>
      <thead><tr><th>Project reference</th><th>Contractor</th><th>Location</th><th>Amount</th><th>Date</th>${showAssigned?'<th>Assigned to</th>':''}<th>Remark</th></tr></thead>
      <tbody>${arr.map(o=>`<tr>
        <td><div style="font-weight:500;font-size:12px">${esc(o.ref)}</div><div style="font-size:10px;color:var(--text2)">${esc(o.endUser||'—')}</div></td>
        <td style="font-size:11px">${esc(o.contractor)}</td>
        <td style="font-size:11px">${esc(o.location)}</td>
        <td style="font-weight:500">${o.amount?(Number(o.amount)>100000?'₹'+Number(o.amount).toLocaleString('en-IN'):'₹'+o.amount+' Cr'):'—'}</td>
        <td style="font-size:11px;color:var(--text2)">${fmt(o.date)}</td>
        ${showAssigned?`<td style="font-size:11px;color:var(--text2)">${esc(userName(o.assignedTo))}</td>`:''}
        <td><div class="cell-clamp">${esc(o.remark||'—')}</div></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  const showAssigned=isAdmin();
  const pageTitle=isAdmin()?'All orders':'My orders';

  document.getElementById('tab-orders').innerHTML=`
    <!-- FY + view selector -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:500">Financial Year:</span>
      <select class="filter-select" id="fy-select-ord" onchange="renderOrders()">${fyOpts}</select>
      <span style="font-size:12px;color:var(--text2)">${isAdmin()?'Showing all salespeople':'Showing your orders only'}</span>
    </div>

    <!-- Metric cards -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px">
      <div class="metric-card" style="border-left:3px solid var(--green)">
        <div class="mc-label" style="color:var(--green)">${pageTitle} received — ${getFYLabel(selFY)}</div>
        <div class="mc-val" style="color:var(--green)">${fmtAmt(rt)}</div>
        <div class="mc-sub">${rcv.length} order${rcv.length!==1?'s':''}</div>
      </div>
      <div class="metric-card" style="border-left:3px solid var(--red)">
        <div class="mc-label" style="color:var(--red)">${pageTitle} lost</div>
        <div class="mc-val" style="color:var(--red)">${lst.length}</div>
        <div class="mc-sub">₹${lt.toLocaleString('en-IN')} value</div>
      </div>
      <div class="metric-card" style="border-left:3px solid var(--sb)">
        <div class="mc-label">Win rate (by value)</div>
        <div class="mc-val" style="color:${Number(winPct)>=50?'var(--green)':'var(--red)'}">${winPct}%</div>
        <div class="mc-sub">of ₹${total.toLocaleString('en-IN')} total</div>
      </div>
      <div class="metric-card" style="border-left:3px solid var(--sc)">
        <div class="mc-label">Win rate (by count)</div>
        <div class="mc-val" style="color:${Number(winCntPct)>=50?'var(--green)':'var(--red)'}">${winCntPct}%</div>
        <div class="mc-sub">${rcv.length} won of ${rcv.length+lst.length} total</div>
      </div>
    </div>

    <!-- Win/Loss bar -->
    ${total>0?`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px">
      <div style="font-size:12px;font-weight:500;margin-bottom:8px">Orders received vs lost — ${getFYLabel(selFY)}</div>
      <div style="display:flex;height:26px;border-radius:6px;overflow:hidden;gap:2px">
        <div style="width:${winPct}%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:500">${Number(winPct)>10?winPct+'% Won':''}</div>
        <div style="width:${lossPct}%;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:500">${Number(lossPct)>10?lossPct+'% Lost':''}</div>
      </div>
      <div style="display:flex;gap:16px;margin-top:6px;font-size:11px">
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;margin-right:4px"></span>Won: ₹${rt.toLocaleString('en-IN')} (${winPct}%)</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--red);border-radius:2px;margin-right:4px"></span>Lost: ₹${lt.toLocaleString('en-IN')} (${lossPct}%)</span>
      </div>
    </div>`:''}

    <!-- Admin: team breakdown -->
    ${isAdmin()&&users.filter(u=>u.role==='sales').length>0?`
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px">
      <div style="font-size:12px;font-weight:500;margin-bottom:8px">👥 Team orders — ${getFYLabel(selFY)}</div>
      <table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr>
          <th style="text-align:left;padding:6px 8px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;color:var(--text2);text-transform:uppercase">Salesperson</th>
          <th style="text-align:right;padding:6px 8px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;color:var(--text2);text-transform:uppercase">Received</th>
          <th style="text-align:right;padding:6px 8px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;color:var(--text2);text-transform:uppercase">Value</th>
          <th style="text-align:right;padding:6px 8px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;color:var(--text2);text-transform:uppercase">Lost</th>
          <th style="text-align:right;padding:6px 8px;background:var(--bg);border-bottom:1px solid var(--border);font-size:10px;color:var(--text2);text-transform:uppercase">Win %</th>
        </tr></thead>
        <tbody>${users.filter(u=>u.role==='sales').map(u=>{
          const uRcv=orders.filter(o=>o.type==='received'&&o.assignedTo===u.username&&isInFY(o.date,selFY));
          const uLst=orders.filter(o=>o.type==='lost'&&o.assignedTo===u.username&&isInFY(o.date,selFY));
          const uVal=uRcv.reduce((a,o)=>a+Number(o.amount||0),0);
          const uWin=(uRcv.length+uLst.length)>0?(uRcv.length/(uRcv.length+uLst.length)*100).toFixed(0):0;
          return '<tr style="border-bottom:1px solid var(--border)">'
            +'<td style="padding:7px 8px;font-weight:500">'+esc(u.name)+'</td>'
            +'<td style="padding:7px 8px;text-align:right;color:var(--green);font-weight:500">'+uRcv.length+'</td>'
            +'<td style="padding:7px 8px;text-align:right;font-weight:500">₹'+uVal.toLocaleString('en-IN')+'</td>'
            +'<td style="padding:7px 8px;text-align:right;color:var(--red)">'+uLst.length+'</td>'
            +'<td style="padding:7px 8px;text-align:right;color:'+(Number(uWin)>=50?'var(--green)':'var(--red)')+'">'+uWin+'%</td>'
            +'</tr>';
        }).join('')}</tbody>
      </table>
    </div>`:''}

    <!-- Orders tables -->

function tryEdit(caseId){
  const c=cases.find(x=>x.id==caseId);
  if(!c){return;}
  if(!isAdmin()&&c.assignedTo!==currentUser?.username&&c.assignedTo!==currentUser?.name){
    alert('You can only edit cases assigned to you.');return;
  }
  renderEditModal(c);
}

async function saveCase(mode, caseId){
  const next=document.getElementById('f-next')?.value.trim();
  if(!next){alert('Next action is required.');return;}

  const newStage=document.getElementById('f-stage').value;
  const histNote=document.getElementById('f-histnote')?.value.trim()||'';
  const oldCase=caseId?cases.find(x=>x.id==caseId):null;

  let obj;
  if(mode==='edit'&&oldCase){
    // ── EDIT: keep all immutable fields from oldCase, only update editable fields ──
    obj={
      ...oldCase,
      stage:newStage,
      followUp:document.getElementById('f-followup').value,
      expectedClosure:document.getElementById('f-closure').value,
      proposalDate:document.getElementById('f-propdate')?.value||oldCase.proposalDate||'',
      nextAction:next,
    };
  } else {
    // ── NEW CASE: read all fields from form ──
    const ref=document.getElementById('f-ref')?.value.trim();
    const type=document.getElementById('f-type')?.value;
    const otherDesc=document.getElementById('f-otherdesc')?.value.trim()||'';
    if(!ref){alert('Project reference is required.');return;}
    if(type==='Other'&&!otherDesc){alert('Project description is required when project type is "Other".');return;}
    const assignedTo=isAdmin()
      ?(document.getElementById('f-assigned')?.value||currentUser?.username||'')
      :(currentUser?.username||'');
    obj={
      id:genId(),
      stage:newStage,ref,projectType:type,otherDesc,
      assignedTo,
      status:document.getElementById('f-status')?.value||'Active',
      location:document.getElementById('f-location')?.value.trim()||'—',
      contractor:document.getElementById('f-contractor')?.value.trim()||'—',
      endUser:document.getElementById('f-enduser')?.value.trim()||'—',
      contactPerson:document.getElementById('f-contact')?.value.trim()||'',
      contactMobile:document.getElementById('f-mobile')?.value.trim()||'',
      contactEmail:document.getElementById('f-email')?.value.trim()||'',
      amount:parseFloat(document.getElementById('f-amount')?.value)||0,
      tenderValue:parseFloat(document.getElementById('f-tender')?.value)||'',
      proposalNo:document.getElementById('f-propno')?.value.trim()||'',
      proposalVer:document.getElementById('f-propver')?.value.trim()||'',
      proposalDate:document.getElementById('f-propdate')?.value||'',
      expectedClosure:document.getElementById('f-closure')?.value||'',
      followUp:document.getElementById('f-followup')?.value||'',
      nextAction:next,
      remark:document.getElementById('f-remark')?.value.trim()||'',
    };
  }

  setSyncState('syncing','Saving…');
  closeModal();

  try{
    if(mode==='new'){
      await appendRow(SHEET_CASES, caseToRow(obj));
      cases.push(obj);
      // Add history row
      await appendRow(SHEET_HISTORY,[genHistId(),obj.id,obj.ref,'—',obj.stage,todayStr(),histNote||'Case created','User']);
    } else {
      // Find row number in sheet (row 1 = header, data starts row 2)
      const rowNum=cases.findIndex(x=>x.id==caseId)+2;
      await updateRow(SHEET_CASES, rowNum, caseToRow(obj));
      const idx=cases.findIndex(x=>x.id==caseId);
      if(idx>=0)cases[idx]=obj;
      // Stage changed or note provided → add history
      if(oldCase&&(newStage!==oldCase.stage||histNote)){
        const note=histNote||(newStage!==oldCase.stage?`Moved from Stage ${oldCase.stage} to Stage ${newStage}`:'Updated');
        await appendRow(SHEET_HISTORY,[genHistId(),obj.id,obj.ref,oldCase.stage,newStage,todayStr(),note,'User']);
        history.push({histId:genHistId(),caseId:obj.id,ref:obj.ref,fromStage:oldCase.stage,toStage:newStage,date:todayStr(),note,updatedBy:'User'});
      }
    }
    setSyncState('ok','Saved '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
    refreshCurrentTab();
  }catch(e){
    setSyncState('error','Save failed — '+e.message);
    alert('Error saving: '+e.message+'\n\nNote: Write operations require OAuth 2.0. See Setup Guide Section 3.');
  }
}

async function promoteCase(caseId){
  const c=cases.find(x=>x.id==caseId); if(!c)return;
  const ci=STAGE_ORDER.indexOf(c.stage);
  if(ci<0||ci>=STAGE_ORDER.length-1){alert('Already at Stage D. Edit manually to update.');return;}
  const nextStage=STAGE_ORDER[ci+1];
  const note=prompt(`Move "${c.ref}"\nStage ${c.stage} → Stage ${nextStage}\n\nAdd a note for history log (optional):`,'');
  if(note===null)return;
  const oldStage=c.stage;
  c.stage=nextStage;
  setSyncState('syncing','Saving…');
  try{
    const rowNum=cases.findIndex(x=>x.id==caseId)+2;
    await updateRow(SHEET_CASES,rowNum,caseToRow(c));
    const histNote=note||`Progressed from Stage ${oldStage} to Stage ${nextStage}`;
    await appendRow(SHEET_HISTORY,[genHistId(),c.id,c.ref,oldStage,nextStage,todayStr(),histNote,'User']);
    history.push({histId:genHistId(),caseId:c.id,ref:c.ref,fromStage:oldStage,toStage:nextStage,date:todayStr(),note:histNote,updatedBy:'User'});
    setSyncState('ok','Saved');
    refreshCurrentTab();
  }catch(e){
    c.stage=oldStage;
    setSyncState('error','Error — '+e.message);
    alert('Promote failed: '+e.message);
  }
}

async function quickUpdateType(caseId, newType){
  const c=cases.find(x=>x.id==caseId); if(!c)return;
  if(newType==='Other'){
    const desc=prompt('Project type set to "Other"\nPlease enter a description (required):','');
    if(!desc){
      // Revert select visually
      renderPipeline(); return;
    }
    c.otherDesc=desc;
  }
  c.projectType=newType;
  setSyncState('syncing','Saving type…');
  try{
    const rowNum=cases.findIndex(x=>x.id==caseId)+2;
    await updateRow(SHEET_CASES,rowNum,caseToRow(c));
    setSyncState('ok','Saved');
  }catch(e){
    setSyncState('error','Save failed — '+e.message);
    alert('Could not save: '+e.message);
  }
}

function confirmDeleteCase(caseId){
  const c=cases.find(x=>x.id==caseId); if(!c)return;
  if(!confirm(`Delete "${c.ref}"?\n\nNote: This removes it from the portal view. To permanently delete from the Sheet, remove the row manually in Google Sheets.`))return;
  cases=cases.filter(x=>x.id!=caseId);
  refreshCurrentTab();
}

async function saveOrder(type){

    ?(document.getElementById('o-assigned')?.value||currentUser?.username||'')

let notifShown = new Set(); // track shown notifications this session

function requestNotifPermission(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}

function showToast(title, body, caseId){
  // Remove existing toasts for same case
  document.querySelectorAll('.notif-toast').forEach(t=>t.remove());
  const div=document.createElement('div');
  div.className='notif-toast';
  div.innerHTML=`
    <span class="notif-close" onclick="this.parentElement.remove()">✕</span>
    <div class="notif-title">🔔 ${title}</div>
    <div class="notif-body">${body}</div>
    <div class="notif-actions">
      <button class="notif-btn notif-btn-green" onclick="tryEdit('${caseId}');this.closest('.notif-toast').remove()">Open case</button>
      <button class="notif-btn notif-btn-gray" onclick="this.closest('.notif-toast').remove()">Dismiss</button>
    </div>`;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(), 8000);
}

function sendBrowserNotif(title, body){
  if('Notification' in window && Notification.permission==='granted'){
    new Notification(title,{body,icon:'https://www.gstatic.com/images/branding/product/1x/drive_2020q4_48dp.png'});
  }
}

function buildReminderMsg(c){
  const followUpFmt=c.followUp?new Date(c.followUp).toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}):'Not set';
  return `Dear ${c.contactPerson?c.contactPerson.split('—')[0].trim():'Sir/Madam'},

Greetings!

This is a follow-up reminder for the below project:

Project  : ${c.ref}
Location : ${c.location}
Value    : ${c.amount?'Rs.'+c.amount+' Cr':'Under discussion'}
Follow-up: ${followUpFmt}
Action   : ${c.nextAction||'Please advise on current status'}
${c.remark?'\nNote: '+c.remark:''}

Kindly revert at the earliest.

Best regards`;
}

function sendWhatsAppAlert(c){
  const msg=buildReminderMsg(c);
  const num=(c.contactMobile||'').replace(/[^0-9]/g,'');
  if(!num){alert('No mobile number saved for this case. Please edit the case and add a contact mobile.');return;}
  const intlNum=num.startsWith('91')?num:'91'+num;
  window.open('https://wa.me/'+intlNum+'?text='+encodeURIComponent(msg),'_blank');
}

function sendEmailAlert(c){
  const msg=buildReminderMsg(c);
  if(!c.contactEmail){alert('No email saved for this case. Please edit the case and add a contact email.');return;}
  window.open('mailto:'+c.contactEmail+'?subject=Follow-up: '+encodeURIComponent(c.ref)+'&body='+encodeURIComponent(msg),'_blank');
}

function checkFollowUpReminders(){
  if(!cases.length||!currentUser) return;
  const vc3=visibleCases();
  const todayCases=vc3.filter(c=>c.followUp&&days(c.followUp)===0&&c.status!=='Hold');
  const overdueCases=vc3.filter(c=>c.followUp&&days(c.followUp)<0&&days(c.followUp)>=-1&&c.status!=='Hold');

  todayCases.forEach((c,idx)=>{
    if(notifShown.has('today_'+c.id)) return;
    notifShown.add('today_'+c.id);
    // Show toast with WhatsApp + Email action buttons
    const hasWA=!!c.contactMobile, hasEmail=!!c.contactEmail;
    const div=document.createElement('div');
    div.className='notif-toast';
    div.style.bottom=(20+(idx*120))+'px';
    div.innerHTML=`
      <span class="notif-close" onclick="this.parentElement.remove()">✕</span>
      <div class="notif-title">📅 Follow-up due TODAY</div>
      <div class="notif-body"><strong>${esc(c.ref)}</strong><br>${esc(c.nextAction||'Action required')}<br><span style="color:#9ca3af">${esc(c.contactPerson||'No contact saved')}</span></div>
      <div class="notif-actions">
        <button class="notif-btn notif-btn-green" onclick="tryEdit('${c.id}');this.closest('.notif-toast').remove()">Open</button>
        ${hasWA?`<button class="notif-btn" style="background:#25d366;color:#fff" onclick="sendWhatsAppAlert(cases.find(x=>x.id=='${c.id}'))">WhatsApp</button>`:''}
        ${hasEmail?`<button class="notif-btn" style="background:#378add;color:#fff" onclick="sendEmailAlert(cases.find(x=>x.id=='${c.id}'))">Email</button>`:''}
        <button class="notif-btn notif-btn-gray" onclick="this.closest('.notif-toast').remove()">Dismiss</button>
      </div>`;
    document.body.appendChild(div);
    setTimeout(()=>div.remove(), 12000);
    // Browser push notification
    sendBrowserNotif('Follow-up TODAY: '+c.ref, (c.nextAction||'Action required')+' — '+c.contactPerson);
  });

  // Overdue batch toast
  if(overdueCases.length&&!notifShown.has('overdue_batch')){
    notifShown.add('overdue_batch');
    setTimeout(()=>{
      showToast('⚠ Overdue follow-ups',
        overdueCases.slice(0,3).map(c=>`• ${c.ref} (${Math.abs(days(c.followUp))}d overdue)`).join('<br>')
        +(overdueCases.length>3?`<br>...+${overdueCases.length-3} more`:''),
        overdueCases[0]?.id||'');
    }, 4000);
  }
}

function renderTodayAlerts(){
  const vc4=visibleCases();
  const todayCases=vc4.filter(c=>c.followUp&&days(c.followUp)===0&&c.status!=='Hold');
  const overdueCases=vc4.filter(c=>c.followUp&&days(c.followUp)<0&&c.status!=='Hold');
  if(!todayCases.length&&!overdueCases.length) return '';
  let html='';
  if(todayCases.length){
    html+=`<div class="today-alert">
      <div class="today-alert-icon">📅</div>
      <div class="today-alert-body">
        <div class="today-alert-title">Follow-ups due TODAY (${todayCases.length})</div>
        <ul class="today-alert-list">${todayCases.map(c=>`<li>
          <strong>${esc(c.ref)}</strong> — ${esc(c.nextAction||'Action required')}
          <div style="float:right;display:flex;gap:4px">
            <button class="btn btn-sm" style="padding:2px 8px;font-size:10px" onclick="tryEdit('${c.id}')">Open</button>
            ${c.contactMobile?`<button class="btn btn-sm" style="padding:2px 8px;font-size:10px;background:#25d366;color:#fff;border-color:#25d366" onclick="sendWhatsAppAlert(cases.find(x=>x.id=='${c.id}'))">WA</button>`:''}
            ${c.contactEmail?`<button class="btn btn-sm" style="padding:2px 8px;font-size:10px;color:var(--sb-t);border-color:var(--sb-t)" onclick="sendEmailAlert(cases.find(x=>x.id=='${c.id}'))">Email</button>`:''}
          </div>
        </li>`).join('')}</ul>
      </div>
    </div>`;
  }
  if(overdueCases.length){
    html+=`<div class="today-alert" style="background:linear-gradient(135deg,#fef2f2,#fff);border-color:#fca5a5">
      <div class="today-alert-icon">⚠️</div>
      <div class="today-alert-body">
        <div class="today-alert-title" style="color:var(--red)">Overdue follow-ups (${overdueCases.length}) — action needed</div>
        <ul class="today-alert-list">${overdueCases.slice(0,5).map(c=>`<li>
          <strong>${esc(c.ref)}</strong> — due ${fmt(c.followUp)} (${Math.abs(days(c.followUp))}d ago)
          <span style="float:right"><button class="btn btn-sm" style="padding:2px 8px;font-size:10px" onclick="tryEdit('${c.id}')">Open</button></span>
        </li>`).join('')}${overdueCases.length>5?`<li style="color:var(--text2)">...and ${overdueCases.length-5} more</li>`:''}</ul>
        <button class="btn btn-sm" style="margin-top:6px" onclick="switchTab('reminders',document.querySelector('.tab:nth-child(3)'))">View all in Reminders →</button>
      </div>
    </div>`;
  }
  return html;
}

async function doLogin(){
  const uname=(document.getElementById('login-username').value||'').trim().toLowerCase();
  const pwd=(document.getElementById('login-password').value||'').trim();
  const errEl=document.getElementById('login-error');
  errEl.style.display='none';

  if(!uname||!pwd){
    errEl.textContent='Please enter username and password.';
    errEl.style.display='block';
    return;
  }

  // Always use Google Sheet users — no hardcoded fallback
  console.log('Login attempt:',uname,'| Sheet users loaded:',users.length);

  if(!users.length){
    // Sheet failed to load — try reloading once more
    errEl.textContent='Reloading user data from Google Sheet…';
    errEl.style.display='block';
    try{
      const uRows=await fetchSheet(SHEET_USERS+'!A2:F100');
      const reloaded=uRows.filter(r=>r[2]).map(rowToUser);
      if(reloaded.length>0){
        users=reloaded;
        errEl.style.display='none';
        console.log('Users reloaded:',users.length);
      } else {
        errEl.textContent='Could not load users from Google Sheet. Please check your internet connection and try again.';
        return;
      }
    }catch(e){
      errEl.textContent='Connection error. Please check internet and refresh the page.';
      return;
    }
  }

  const user=users.find(u=>u.username===uname && u.password===pwd);

  if(!user){
    // Check if username exists but password wrong
    const userExists=users.find(u=>u.username===uname);
    if(userExists){
      errEl.textContent='Incorrect password. Please try again.';
    } else {
      errEl.textContent='Username not found. Please check and try again.';
    }
    errEl.style.display='block';
    document.getElementById('login-password').value='';
    document.getElementById('login-password').focus();
    return;
  }

  currentUser=user;
  // users loaded from Google Sheet in loadAllData
  try{sessionStorage.setItem('crm_user',JSON.stringify({
    id:user.id,name:user.name,username:user.username,role:user.role,email:user.email
  }));}catch(e){}

  showPortal(user);
  refreshCurrentTab();
}

function doLogout(){
  currentUser=null;
  try{ sessionStorage.removeItem('crm_user'); }catch(e){}
  document.getElementById('portal-wrap').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-username').value='';
  document.getElementById('login-password').value='';
  document.getElementById('login-error').style.display='none';
  document.getElementById('user-info-badge').innerHTML='';
  document.getElementById('login-username').focus();
}

function restoreSession(){
  try{
    const saved=sessionStorage.getItem('crm_user');
    if(saved){ currentUser=JSON.parse(saved); return true; }
  }catch(e){}
  return false;
}

function copyReminderMsg(){
